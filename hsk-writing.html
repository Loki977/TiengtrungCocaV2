<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luyện viết</title>
  <style>
    :root {
      --page-bg: #edf5f7;
      --navy: #10234a;
      --muted: #858aa3;
      --cream: #fff7df;
      --white: #ffffff;
      --yellow: #f7b400;
      --yellow-2: #ffc21a;
      --orange: #ff8a2a;
      --red: #f4484d;
      --red-2: #f86b6f;
      --shadow: 0 18px 42px rgba(39, 62, 92, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--navy);
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.9), transparent 26%),
        linear-gradient(135deg, #eaf4f6 0%, #f3f7f4 48%, #e8f1f5 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1380px, calc(100% - 44px));
      margin: 0 auto;
      padding: 38px 0 74px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 34px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0;
    }

    .brand__mark {
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, #ffb000, #ff7a24);
      box-shadow: 0 10px 22px rgba(255, 138, 42, 0.24);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid rgba(16, 35, 74, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(14px);
    }

    .nav a {
      padding: 10px 15px;
      border-radius: 999px;
      color: #526078;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .nav a.active {
      color: #fff;
      background: #10234a;
    }

    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 30px;
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      color: #bb5a00;
      background: rgba(255, 194, 26, 0.18);
      font-size: 13px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 4.2vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 580px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.65;
      font-weight: 650;
    }

    .summary {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      border: 1px solid rgba(16, 35, 74, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 10px 26px rgba(55, 70, 92, 0.08);
    }

    .summary strong {
      display: block;
      font-size: 24px;
    }

    .summary span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .levels-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }

    .level-card {
      position: relative;
      min-height: 235px;
      padding: 28px;
      overflow: hidden;
      border: 1px solid var(--accent-soft);
      border-radius: 28px;
      background:
        linear-gradient(138deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 251, 235, 0.92) 46%, var(--tint) 100%);
      box-shadow: var(--shadow);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      isolation: isolate;
    }

    .level-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 24px 50px rgba(39, 62, 92, 0.17);
    }

    .level-card::before {
      content: "";
      position: absolute;
      inset: auto -18px -46px -18px;
      height: 122px;
      background:
        radial-gradient(ellipse at 16% 92%, rgba(255, 255, 255, 0.86) 0 20%, transparent 21%),
        radial-gradient(ellipse at 42% 92%, rgba(255, 255, 255, 0.72) 0 17%, transparent 18%),
        radial-gradient(ellipse at 72% 92%, rgba(255, 255, 255, 0.82) 0 21%, transparent 22%),
        linear-gradient(135deg, transparent 0 24%, rgba(107, 128, 156, 0.11) 25% 36%, transparent 37%),
        linear-gradient(45deg, transparent 0 31%, rgba(107, 128, 156, 0.09) 32% 43%, transparent 44%);
      opacity: 0.72;
      z-index: -1;
    }

    .level-card::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      right: -54px;
      top: -56px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      z-index: -1;
    }

    .lesson-count {
      position: absolute;
      top: 24px;
      right: 28px;
      color: #6f7890;
      font-size: 15px;
      font-weight: 900;
    }

    .illustration {
      position: absolute;
      left: 22px;
      bottom: 24px;
      width: 118px;
      height: 118px;
      opacity: 0.2;
      transform: rotate(-7deg);
      display: grid;
      place-items: center;
      color: var(--accent);
      pointer-events: none;
    }

    .illustration svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr) 82px;
      min-height: 179px;
      align-items: center;
      gap: 18px;
    }

    .level-copy {
      text-align: center;
      min-width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      margin-bottom: 18px;
      padding: 8px 13px;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--badge-start), var(--badge-end));
      font-size: 15px;
      font-weight: 950;
      box-shadow: 0 9px 18px color-mix(in srgb, var(--accent) 24%, transparent);
    }

    .level-title {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: clamp(30px, 2.4vw, 36px);
      line-height: 1.04;
      font-weight: 950;
      letter-spacing: 0;
    }

    .level-desc {
      min-height: 58px;
      margin: 0 auto 18px;
      color: var(--muted);
      font-size: clamp(18px, 1.5vw, 21px);
      line-height: 1.38;
      font-weight: 750;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 9%, #fff 91%);
      font-size: 14px;
      font-weight: 950;
    }

    .bars {
      display: inline-flex;
      align-items: end;
      gap: 3px;
      height: 15px;
    }

    .bars i {
      display: block;
      width: 4px;
      border-radius: 8px;
      background: currentColor;
    }

    .bars i:nth-child(1) {
      height: 8px;
    }

    .bars i:nth-child(2) {
      height: 13px;
    }

    .bars i:nth-child(3) {
      height: 10px;
    }

    .arrow-wrap {
      display: grid;
      width: 82px;
      height: 82px;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 248, 225, 0.92);
      box-shadow: inset 0 0 0 9px rgba(255, 247, 223, 0.95), 0 12px 26px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .arrow-btn {
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--badge-start), var(--badge-end));
      cursor: pointer;
      transition: transform 160ms ease;
    }

    .level-card:hover .arrow-btn {
      transform: translateX(3px);
    }

    .arrow-btn svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .zalo-float {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 132px;
      padding: 12px 18px;
      border-radius: 24px;
      color: #fff;
      background: #0877ff;
      box-shadow: 0 12px 28px rgba(8, 119, 255, 0.3);
      font-weight: 900;
      line-height: 1.18;
    }

    .zalo-float span:last-child {
      margin-top: 2px;
      font-size: 12px;
      opacity: 0.9;
    }

    @media (max-width: 1120px) {
      .levels-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero {
        align-items: start;
        flex-direction: column;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 28px, 520px);
        padding-top: 22px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
        margin-bottom: 26px;
      }

      .nav {
        overflow-x: auto;
        justify-content: start;
        border-radius: 18px;
      }

      .levels-grid {
        grid-template-columns: 1fr;
      }

      .level-card {
        min-height: 245px;
        padding: 24px;
      }

      .card-content {
        grid-template-columns: 54px minmax(0, 1fr) 70px;
        gap: 10px;
      }

      .illustration {
        width: 92px;
        height: 92px;
        left: 12px;
      }

      .lesson-count {
        top: 20px;
        right: 24px;
      }

      .arrow-wrap {
        width: 70px;
        height: 70px;
      }

      .arrow-btn {
        width: 50px;
        height: 50px;
      }

      .zalo-float {
        right: 16px;
        bottom: 16px;
      }
    }

    @media (max-width: 420px) {
      .card-content {
        grid-template-columns: 1fr;
        padding-top: 18px;
      }

      .arrow-wrap {
        justify-self: center;
        width: 64px;
        height: 64px;
      }

      .arrow-btn {
        width: 46px;
        height: 46px;
      }

      .level-desc {
        min-height: auto;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/css/dark-mode.css" />
  <script src="assets/js/dark-mode.js"></script>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Về trang chủ">
        <span class="brand__mark">HSK</span>
        <span>Tiếng Trung Cam &amp; Coca</span>
      </a>
      <nav class="nav" aria-label="Điều hướng chính">
        <a href="hsk.html">Khóa học</a>
        <a href="hsk-writing.html" class="active">Luyện viết</a>
        <a href="flashcard.html">Flashcard</a>
        <a href="vocabulary.html">Từ vựng</a>
      </nav>
    </header>

    <section class="hero" aria-labelledby="pageTitle">
      <div>
        <span class="eyebrow">Luyện viết theo cấp độ HSK</span>
        <h1 id="pageTitle">Chọn cấp độ luyện viết</h1>
        <p>Rèn nét, ghi nhớ từ vựng và luyện phản xạ viết tiếng Trung theo từng cấp độ từ HSK1 đến HSK6.</p>
      </div>
      <div class="summary" aria-label="Tổng số cấp độ">
        <div>
          <strong>6</strong>
          <span>Cấp độ HSK</span>
        </div>
        <div>
          <strong>146</strong>
          <span>Bài luyện viết</span>
        </div>
      </div>
    </section>

    <section class="levels-grid" id="levelsGrid" aria-label="Danh sách cấp độ luyện viết"></section>
  </main>

  <a class="zalo-float" href="#" aria-label="Zalo chăm sóc khách hàng">
    <span>Zalo CSKH</span>
    <span>09:00–22:00</span>
  </a>

  <script>
    const levels = [
      {
        hsk: "HSK1",
        title: "Sơ cấp",
        description: "Giao tiếp sinh hoạt hằng ngày",
        lessons: "15 bài",
        status: "Bắt đầu",
        tone: "yellow",
        illustration: "notebook",
        href: "hsk1-writing-lessons.html"
      },
      {
        hsk: "HSK2",
        title: "Sơ cấp",
        description: "Từ vựng và mẫu câu nền tảng",
        lessons: "15 bài",
        status: "Đang học",
        tone: "yellow",
        illustration: "dictionary",
        href: "hsk1-writing-lessons.html?level=hsk2"
      },
      {
        hsk: "HSK3",
        title: "Sơ cấp",
        description: "Diễn đạt chủ đề quen thuộc",
        lessons: "20 bài",
        status: "Bắt đầu",
        tone: "yellow",
        illustration: "chat",
        href: "hsk1-writing-lessons.html?level=hsk3"
      },
      {
        hsk: "HSK4",
        title: "Trung cấp",
        description: "Giao tiếp linh hoạt hơn",
        lessons: "20 bài",
        status: "Bắt đầu",
        tone: "orange",
        illustration: "lantern",
        href: "hsk1-writing-lessons.html?level=hsk4"
      },
      {
        hsk: "HSK5",
        title: "Cao cấp",
        description: "Đọc hiểu và thảo luận mở rộng",
        lessons: "36 bài",
        status: "Bắt đầu",
        tone: "red",
        illustration: "searchBook",
        href: "hsk1-writing-lessons.html?level=hsk5"
      },
      {
        hsk: "HSK6",
        title: "Cao cấp",
        description: "Nâng cao phản xạ ngôn ngữ",
        lessons: "40 bài",
        status: "Bắt đầu",
        tone: "red",
        illustration: "graduate",
        href: "hsk1-writing-lessons.html?level=hsk6"
      }
    ];

    const tones = {
      yellow: {
        accent: "#f7b400",
        badgeStart: "#f7b400",
        badgeEnd: "#ffc21a",
        accentSoft: "rgba(247, 180, 0, 0.32)",
        tint: "rgba(255, 241, 178, 0.66)"
      },
      orange: {
        accent: "#ff8a2a",
        badgeStart: "#ff9b34",
        badgeEnd: "#ff7422",
        accentSoft: "rgba(255, 138, 42, 0.34)",
        tint: "rgba(255, 221, 191, 0.66)"
      },
      red: {
        accent: "#f4484d",
        badgeStart: "#f4484d",
        badgeEnd: "#f86b6f",
        accentSoft: "rgba(244, 72, 77, 0.32)",
        tint: "rgba(255, 216, 220, 0.66)"
      }
    };

    const illustrations = {
      notebook: `
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <path d="M28 20h48a13 13 0 0 1 13 13v60a9 9 0 0 1-9 9H28z" />
          <path d="M28 20v82M42 38h28M42 54h28M42 70h22M88 30l12 12M70 95l30-30 10 10-30 30-14 4z" />
        </svg>`,
      dictionary: `
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <path d="M25 22h56a14 14 0 0 1 14 14v63H36a11 11 0 0 1-11-11z" />
          <path d="M36 22v77M48 43h30M48 59h24M48 75h33M87 36h8" />
          <path d="M80 22v22l8-6 7 6V24" />
        </svg>`,
      chat: `
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <path d="M22 34a20 20 0 0 1 20-20h36a20 20 0 0 1 20 20v16a20 20 0 0 1-20 20H57L35 88V70A20 20 0 0 1 22 51z" />
          <path d="M42 42h36M42 56h24M72 76h7a16 16 0 0 1 16 16v14l-16-12H56a16 16 0 0 1-15-10" />
        </svg>`,
      lantern: `
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <path d="M47 20h26M60 10v10M45 100h30M60 100v12" />
          <path d="M37 37c0-10 10-17 23-17s23 7 23 17v35c0 12-10 23-23 23S37 84 37 72z" />
          <path d="M38 39h44M38 72h44M60 23c-10 10-10 58 0 70M60 23c10 10 10 58 0 70" />
        </svg>`,
      searchBook: `
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <path d="M20 28h34a15 15 0 0 1 15 15v55H35a15 15 0 0 0-15 15z" />
          <path d="M69 43a15 15 0 0 1 15-15h16v48M36 48h18M36 64h18" />
          <circle cx="79" cy="74" r="17" />
          <path d="M91 86l19 19" />
        </svg>`,
      graduate: `
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <path d="M14 42l46-22 46 22-46 22z" />
          <path d="M35 55v22c0 10 12 18 25 18s25-8 25-18V55" />
          <path d="M100 46v28M100 74l-8 12" />
          <path d="M28 98h64M38 86h44" />
        </svg>`
    };

    const grid = document.getElementById("levelsGrid");

    function renderLevels() {
      grid.innerHTML = levels.map((level) => {
        const tone = tones[level.tone];

        return `
          <article
            class="level-card"
            style="--accent:${tone.accent};--badge-start:${tone.badgeStart};--badge-end:${tone.badgeEnd};--accent-soft:${tone.accentSoft};--tint:${tone.tint};"
          >
            <span class="lesson-count">${level.lessons}</span>
            <div class="illustration">${illustrations[level.illustration]}</div>
            <div class="card-content">
              <span aria-hidden="true"></span>
              <div class="level-copy">
                <span class="badge">${level.hsk}</span>
                <h2 class="level-title">${level.title}</h2>
                <p class="level-desc">${level.description}</p>
                <span class="status-pill">
                  <span class="bars" aria-hidden="true"><i></i><i></i><i></i></span>
                  ${level.status}
                </span>
              </div>
              <div class="arrow-wrap">
                <a class="arrow-btn" href="${level.href || "#"}" aria-label="Mở ${level.hsk}">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h14"></path>
                    <path d="m13 6 6 6-6 6"></path>
                  </svg>
                </a>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    renderLevels();
  </script>
<script type="module" src="assets/js/firebase-auth.js"></script>
  <script type="module" src="assets/js/access-logger.js"></script>
</body>
</html>
